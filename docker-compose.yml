version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: specdrivr_db
    restart: always
    environment:
      POSTGRES_USER: specdrivr
      POSTGRES_PASSWORD: specdrivr_password
      POSTGRES_DB: specdrivr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specdrivr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
